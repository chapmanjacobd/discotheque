name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          make ubuntu-deps
          make go-deps
          make web-install

      - name: Run all checks and build
        run: make all

  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            web/package-lock.json
            e2e/package-lock.json

      - name: Install system dependencies
        run: make ubuntu-deps

      - name: Install web and e2e dependencies
        run: |
          make web-install
          make e2e-install

      - name: Run Playwright tests
        run: make e2e
        env:
          DISCO_BINARY: ${{ github.workspace }}/disco
          DISCO_BASE_URL: http://localhost:8080
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/test-results/
          retention-days: 7

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-html-report
          path: e2e/playwright-report/
          retention-days: 7
